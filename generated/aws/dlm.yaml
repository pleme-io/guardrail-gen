- name: aws-dlm-delete-lifecycle-policy
  pattern: (?i)aws\s+delete\-lifecycle\-policy\b
  severity: block
  message: DeleteLifecyclePolicy — destructive operation
  category: cloud
- name: aws-dlm-untag-resource
  pattern: (?i)aws\s+untag\-resource\b
